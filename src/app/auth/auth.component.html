<div class="row">
    <div style="text-align: center;"*ngIf="isLoading"> 
        <app-loading-spinner></app-loading-spinner>
     </div>


     <app-alert *ngIf="error" [message]="error" (click)="OnCloseAlert()"></app-alert>

    <div class="col-xs-12 col-md-6 col-md-offset-3" *ngIf="!isLoading">
        <div>
      <form #authForm="ngForm" (ngSubmit)="onSubmit(authForm)">
        <div class="form-group">
          <label for="email">E-Mail</label>
          <input type="email" id="email"
           class="form-control"
            email
            required
            ngModel
            name="email"
            />
        </div>
        <div class="form-group">
          <label for="password" >Password</label>
          <input type="password" 
          id="password"
          class="form-control" 
          password
          required
          ngModel
          name="password"/>
        </div>
        <div>
          <button class="btn btn-primary" [disabled]="!authForm.valid">{{isLoginMode ? 'Login' : 'Sign Up'}}</button> |
          <button class="btn btn-primary" (click)="onSwitchMode()">{{!isLoginMode ? 'Switch to Login' : 'Switch to Sign Up'}}</button>
        </div>
      </form>
    </div>
  </div>
